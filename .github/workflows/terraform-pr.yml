name: Terraform PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: terraform-pr-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve tfvars file
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            echo "TF_VAR_FILE=environments/prod.tfvars" >> "$GITHUB_ENV"
          elif [[ "${{ github.base_ref }}" == "develop" ]]; then
            echo "TF_VAR_FILE=environments/staging.tfvars" >> "$GITHUB_ENV"
          else
            echo "TF_VAR_FILE=environments/dev.tfvars" >> "$GITHUB_ENV"
          fi

      - name: Resolve lambda_function_name from S3 state
        run: |
          BUCKET="fiap-tech-challenge-tfstate-fase3-matheus"
          LAMBDA_NAME=$(aws s3 cp "s3://${BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)
          LAMBDA_NAME="${LAMBDA_NAME:-autoflow-auth-homolog}"
          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"

      - run: terraform init -input=false
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -lock=false -input=false -no-color \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="newrelic_account_id=${{ secrets.NEWRELIC_ACCOUNT_ID }}" \
            -var="newrelic_api_key=${{ secrets.NEWRELIC_API_KEY }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}"
