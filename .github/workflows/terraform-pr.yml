name: Terraform PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: terraform-pr-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TF_VAR_FILE: environments/dev.tfvars

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap S3 backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tc-tfstate-${ACCOUNT_ID}"
          aws s3 ls "s3://${BUCKET}" > /dev/null 2>&1 || \
            aws s3 mb "s3://${BUCKET}" --region ${{ env.AWS_REGION }}
          cat > backend.tf << EOF
          terraform {
            backend "s3" {
              bucket       = "${BUCKET}"
              key          = "k8s-infra/terraform.tfstate"
              region       = "${{ env.AWS_REGION }}"
              use_lockfile = true
              encrypt      = true
            }
          }
          EOF
          echo "TFSTATE_BUCKET=${BUCKET}" >> "$GITHUB_ENV"

      - name: Resolve lambda_function_name from S3 state
        run: |
          LAMBDA_NAME=$(aws s3 cp "s3://${TFSTATE_BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)
          LAMBDA_NAME="${LAMBDA_NAME:-autoflow-auth-homolog}"
          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"

      - run: terraform init -input=false
      - run: terraform fmt -check -recursive
      - run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -lock=false -input=false -no-color \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}"
