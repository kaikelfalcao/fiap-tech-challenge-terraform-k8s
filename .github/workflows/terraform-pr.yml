name: Terraform PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: terraform-pr-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true

jobs:
  terraform-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]]; then
            terraform plan -lock=false -var-file=environments/prod.tfvars -no-color
          elif [[ "${{ github.base_ref }}" == "develop" ]]; then
            terraform plan -lock=false -var-file=environments/staging.tfvars -no-color
          else
            terraform plan -lock=false -var-file=environments/dev.tfvars -no-color
          fi