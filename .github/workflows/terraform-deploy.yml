name: Terraform Deploy

on:
  push:
    branches: [develop, main]

concurrency:
  group: terraform-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: fiap-tc-dev-eks
  TF_VAR_FILE: environments/dev.tfvars

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'develop' }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap S3 backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tc-tfstate-${ACCOUNT_ID}"
          aws s3 ls "s3://${BUCKET}" > /dev/null 2>&1 || aws s3 mb "s3://${BUCKET}" --region ${{ env.AWS_REGION }}
          cat > backend.tf << EOF
          terraform {
            backend "s3" {
              bucket       = "${BUCKET}"
              key          = "k8s-infra/terraform.tfstate"
              region       = "${{ env.AWS_REGION }}"
              use_lockfile = true
              encrypt      = true
            }
          }
          EOF

      - run: terraform init -input=false

      - name: Apply — Fase 1 (infra base)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="lambda_function_name=${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            -target=module.vpc \
            -target=module.eks \
            -target=aws_security_group.rds \
            -target=aws_security_group.lambda \
            -target=helm_release.kong \
            -target=helm_release.newrelic \
            -target=kubernetes_namespace.kong \
            -target=kubernetes_namespace.newrelic

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: Apply — Fase 2 (Kong routes + manifests)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="lambda_function_name=${{ secrets.LAMBDA_FUNCTION_NAME }}"
