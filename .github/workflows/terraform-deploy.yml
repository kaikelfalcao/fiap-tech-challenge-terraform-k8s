name: Terraform Deploy

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: terraform-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve tfvars file
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "TF_VAR_FILE=environments/prod.tfvars" >> "$GITHUB_ENV"
          else
            echo "TF_VAR_FILE=environments/staging.tfvars" >> "$GITHUB_ENV"
          fi

      # Lê lambda_function_name do state S3 do repo lambda.
      # Se o repo lambda ainda não foi deployado, usa o valor padrão da variável.
      - name: Resolve lambda_function_name from S3 state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tech-challenge-tfstate-fase3-matheus"
          LAMBDA_NAME=$(aws s3 cp "s3://${BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)
          LAMBDA_NAME="${LAMBDA_NAME:-autoflow-auth-homolog}"
          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"
          echo "lambda_function_name resolved: ${LAMBDA_NAME}"

      - run: terraform init -input=false

      - name: Apply — Fase 1 (infra base)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="newrelic_account_id=${{ secrets.NEWRELIC_ACCOUNT_ID }}" \
            -var="newrelic_api_key=${{ secrets.NEWRELIC_API_KEY }}" \
            -var="newrelic_alert_email=${{ secrets.NEWRELIC_ALERT_EMAIL }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}" \
            -target=module.vpc \
            -target=module.eks \
            -target=aws_security_group.rds \
            -target=aws_security_group.lambda \
            -target=helm_release.kong \
            -target=helm_release.newrelic \
            -target=kubernetes_namespace.kong \
            -target=kubernetes_namespace.newrelic \
            -target=kubernetes_namespace.autoflow

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name fiap-tc-dev-eks

      # Relê o lambda_function_name — pode ter sido atualizado entre a Fase 1 e aqui.
      - name: Refresh lambda_function_name
        run: |
          BUCKET="fiap-tech-challenge-tfstate-fase3-matheus"
          LAMBDA_NAME=$(aws s3 cp "s3://${BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)
          LAMBDA_NAME="${LAMBDA_NAME:-${{ env.LAMBDA_FUNCTION_NAME }}}"
          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"

      - name: Apply — Fase 2 (Kong routes + manifests)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="newrelic_account_id=${{ secrets.NEWRELIC_ACCOUNT_ID }}" \
            -var="newrelic_api_key=${{ secrets.NEWRELIC_API_KEY }}" \
            -var="newrelic_alert_email=${{ secrets.NEWRELIC_ALERT_EMAIL }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}"
