name: Terraform Deploy

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: terraform-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Bootstrap (igual ao script local) ───────────────────────────────
      - name: Bootstrap Terraform backend
        run: |
          set -e

          REGION=${AWS_REGION:-${AWS_DEFAULT_REGION:-us-east-1}}
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tc-tfstate-${ACCOUNT_ID}"

          echo "Account : $ACCOUNT_ID"
          echo "Bucket  : $BUCKET"
          echo "Region  : $REGION"

          if aws s3 ls "s3://${BUCKET}" > /dev/null 2>&1; then
            echo "Bucket já existe"
          else
            echo "Criando bucket..."
            aws s3 mb "s3://${BUCKET}" --region "$REGION"

            aws s3api put-bucket-versioning \
              --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled

            aws s3api put-bucket-encryption \
              --bucket "$BUCKET" \
              --server-side-encryption-configuration \
                '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

            echo "Bucket criado"
          fi

          cat > backend.tf << EOF
          terraform {
            backend "s3" {
              bucket       = "${BUCKET}"
              key          = "k8s-infra/terraform.tfstate"
              region       = "${REGION}"
              use_lockfile = true
              encrypt      = true
            }
          }
          EOF

          echo "backend.tf gerado"

      # ── Init ───────────────────────────────────────────────────────────
      - run: terraform init -input=false -reconfigure

      # ── Resolve tfvars (igual pipeline atual) ───────────────────────────
      - name: Resolve tfvars file
        run: echo "TF_VAR_FILE=environments/dev.tfvars" >> "$GITHUB_ENV"

      # ── Lambda name (igual script local) ────────────────────────────────
      - name: Resolve lambda_function_name from S3 state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tc-tfstate-${ACCOUNT_ID}"

          LAMBDA_NAME=$(aws s3 cp "s3://${BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)

          LAMBDA_NAME="${LAMBDA_NAME:-${TF_VAR_lambda_function_name:-autoflow-auth-homolog}}"

          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"
          echo "lambda_function_name = ${LAMBDA_NAME}"

      # ── Limpeza (igual script) ──────────────────────────────────────────
      - name: Limpar log group existente
        run: |
          aws logs delete-log-group \
            --log-group-name /aws/eks/fiap-tc-dev-eks/cluster \
            --region "$AWS_REGION" 2>/dev/null \
            && echo "Log group deletado" || echo "Log group não existe, ok"

      # ── Fase 1 ─────────────────────────────────────────────────────────
      - name: Apply — Fase 1 (infra base)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="newrelic_account_id=${{ secrets.NEWRELIC_ACCOUNT_ID }}" \
            -var="newrelic_api_key=${{ secrets.NEWRELIC_API_KEY }}" \
            -target=module.vpc \
            -target=module.eks \
            -target=aws_security_group.rds \
            -target=aws_security_group.lambda \
            -target=helm_release.kong \
            -target=helm_release.newrelic \
            -target=kubernetes_namespace.kong \
            -target=kubernetes_namespace.newrelic

      # ── kubectl ────────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "fiap-tc-dev-eks")
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name "$CLUSTER_NAME"

      # ── Refresh lambda ─────────────────────────────────────────────────
      - name: Refresh lambda_function_name
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="fiap-tc-tfstate-${ACCOUNT_ID}"

          LAMBDA_NAME=$(aws s3 cp "s3://${BUCKET}/lambda/terraform.tfstate" - 2>/dev/null | \
            jq -r '.outputs.function_name.value // empty' 2>/dev/null || true)

          LAMBDA_NAME="${LAMBDA_NAME:-${{ env.LAMBDA_FUNCTION_NAME }}}"

          echo "LAMBDA_FUNCTION_NAME=${LAMBDA_NAME}" >> "$GITHUB_ENV"

      # ── Fase 2 ─────────────────────────────────────────────────────────
      - name: Apply — Fase 2 (Kong routes + manifests)
        run: |
          terraform apply -auto-approve -input=false \
            -var-file="${{ env.TF_VAR_FILE }}" \
            -var="lambda_function_name=${{ env.LAMBDA_FUNCTION_NAME }}" \
            -var="newrelic_license_key=${{ secrets.NEWRELIC_LICENSE_KEY }}" \
            -var="newrelic_account_id=${{ secrets.NEWRELIC_ACCOUNT_ID }}" \
            -var="newrelic_api_key=${{ secrets.NEWRELIC_API_KEY }}"

      # ── Output final ───────────────────────────────────────────────────
      - name: Terraform output
        run: terraform output
